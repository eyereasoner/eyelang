name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read version
        id: version
        run: |
          version="$(cat VERSION)"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "VERSION is $version but tag is $GITHUB_REF_NAME"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build and test
        run: |
          make
          make test

      - name: Create source archive
        run: |
          git archive --format=tar.gz \
            --prefix="eyelog-${{ steps.version.outputs.version }}/" \
            -o "eyelog-${{ steps.version.outputs.version }}.tar.gz" \
            HEAD

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "eyelog-${{ steps.version.outputs.version }}.tar.gz" \
            --generate-notes
